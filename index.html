<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Citeline Health — AI-Powered Prior Authorization</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ============================================================
   DESIGN TOKENS — Citeline Design System
   ============================================================ */
:root {
  --color-brand-charcoal:    #3D3D3D;
  --color-brand-cream:       #FAF9F5;
  --color-brand-light-gray:  #E8E6DC;
  --color-brand-mid-gray:    #9A9A9A;
  --color-brand-orange:      #D97757;
  --color-brand-sage:        #788C5D; /* New Green Token */
  
  --sky:          #87CEEB;
  --text:         var(--color-brand-charcoal);
  --muted:        var(--color-brand-charcoal); 
  --orange:       var(--color-brand-orange);
  --sage:         var(--color-brand-sage);
  
  --r-xs: 8px;
  --r-md: 18px;
  --r-lg: 24px;
  --r-xl: 30px;

  --space-xl: 20px;
  --space-3xl: 32px;
  --space-4xl: 40px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--sky);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* NAVIGATION */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 64px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--space-4xl);
  background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
  border-bottom: 1px solid var(--color-brand-light-gray);
}
.nav-logo {
  display: flex; align-items: center; gap: 8px; /* Tighter spacing as requested */
  text-decoration: none; color: var(--text);
}
.nav-logo img { height: 28px; width: auto; }
.nav-logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }

/* HERO */
